<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | MyECommerce</title>
</head>
<body>

<div th:if="${param.success}" style="color: green; margin-bottom: 10px;">
    ¡Registro completado! Por favor, inicia sesión.
</div>

<form th:action="@{/login}" method="post">
    <div>
        <input type="email" name="username" placeholder="E-mail" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Sign In</button>
        <p>Not registered yet? <a href="/register"> Create an account.</a></p>
    </div>
</form>

</body>
</html>
