<section layout:decorate="~{layouts/main-layout}"
         xmlns:th="http://www.thymeleaf.org"
         xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
         xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
         sec:authorize="isAuthenticated()">
    <div layout:fragment="content">
        <h2 th:text="|${userData.name} ${userData.firstName}|">Customer CompleteName</h2>
        <h1 th:text="${userData.username}">Customer@Email.com</h1>
        <div>
            <div th:replace="~{fragments/profile-field :: user-field(Name,${userData.name})}"></div>
            <div th:replace="~{fragments/profile-field :: user-field(FirstName,${userData.firstName})}"></div>
            <div th:replace="~{fragments/profile-field :: user-field(Email,${userData.email})}"></div>
            <div th:replace="~{fragments/profile-field :: user-field(Phone,${userData.phone})}"></div>
            <div th:replace="~{fragments/profile-field :: user-field(Address,${userData.userAddress})}"></div>
            <div>
                <div th:replace="~{fragments/buttons :: modal-trigger(updatePasswordModal,'UPDATE PASSWORD', iconUrl)}"></div>
                <div th:replace="~{fragments/buttons :: modal-trigger(updateProfileModal,'UPDATE PROFILE', iconUrl)}"></div>
            </div>
            <div th:replace="~{modals/update-password :: modal-update-password(${passwordUpdateDto})}"></div>
            <div th:replace="~{modals/update-user :: modal-update-profile(${userUpdateDto})}"></div>
            </div>
        </div>
    </div>
</section>
